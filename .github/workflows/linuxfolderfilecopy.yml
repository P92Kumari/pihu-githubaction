name: Sample Linux File Operations

on:
  workflow_dispatch:

jobs:
  file-operations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Folder and File
        run: |
          echo "Creating folder..."
          kdir my_folder

          echo "Creating file..."
          echo "Hello Ravi, this is a sample GitHub Actions workflow." > sample.txt

          echo "Copying file to folder..."
          cp sample.txt my_folder/

      - name: Verify Files
        run: |
          echo "Current directory contents:"
          ls -lrt

          echo ""
          echo "Contents inside my_folder:"
          ls -lrt my_folder

          echo ""
          echo "Displaying file content:"
          cat my_folder/sample.txt

      - name: Add Job Summary
        run: |
          echo "## GitHub Actions Learning Workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What this workflow did" >> $GITHUB_STEP_SUMMARY
          echo "- Created a new Linux folder named \`my_folder\`" >> $GITHUB_STEP_SUMMARY
          echo "- Created a file named \`sample.txt\`" >> $GITHUB_STEP_SUMMARY
          echo "- Copied the file into the folder" >> $GITHUB_STEP_SUMMARY
          echo "- Verified the contents using Linux commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Runner Information" >> $GITHUB_STEP_SUMMARY
          echo "- Runner OS: ubuntu-latest" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow Trigger: Manual" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### File Content" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat my_folder/sample.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
